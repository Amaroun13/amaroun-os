---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: amaroun-os
description: Moje vlastní ublue Kinoite s msi-ec a herní výbavou.

# Správný ublue základ (pokud máš NVIDIA grafiku, ublue-os/kinoite-nvidia je jistota)
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # Na ublue základu se pro instalaci balíčků a COPR používá modul rpm-ostree, ne surové dnf!
  - type: rpm-ostree
    repos:
      - xabi08-MSI-EC-fedora-%OS_VERSION%
      - atim-starship-fedora-%OS_VERSION%
    install:
      - micro
      - starship
      - akmod-msi-ec
    remove:
      - firefox
      - firefox-langpacks

  # Tvůj výběr Flatpaků
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - com.brave.Browser
          - com.valvesoftware.Steam
          - net.lutris.Lutris
      - scope: user

  - type: signing
