---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: amaroun-os
description: Čistá Fedora Kinoite - kompletní cloudový upgrade před kompilací.

base-image: quay.io/fedora/fedora-kinoite
image-version: 44
modules:
  - type: files
    files:
      - source: system
        destination: /

  # 🚀 UKRUTNÝ UPGRADE: Aktualizujeme kompletně celý systém v cloudu
  - type: script
    snippets:
      - dnf upgrade -y

  # Kompilace NVIDIA ovladačů na kompletně aktualizovaném základu
  - type: akmods
    install:
      - nvidia

  # Instalace msi-ec z COPR repozitáře
  - type: dnf
    repos:
      copr:
        - xabi08/MSI-EC
        - atim/starship
    install:
      packages:
        - micro
        - starship
        - akmod-msi-ec
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # Instalace Flatpaků (Brave, Steam, Lutris)
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - com.brave.Browser
          - com.valvesoftware.Steam
          - net.lutris.Lutris
      - scope: user

  # Vygenerování Secure Boot klíčů
  - type: signing
