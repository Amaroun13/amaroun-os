---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: amaroun-os
description: Moje vlastní ublue Kinoite bez konfliktních příkazů.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  # Čistý zápis pro ublue základ
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/xabi08/MSI-EC/repo/fedora-%OS_VERSION%/xabi08-MSI-EC-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
    install:
      - micro
      - starship
      - akmod-msi-ec

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - org.kde.gwenview
          - com.brave.Browser
          - com.valvesoftware.Steam
          - net.lutris.Lutris
      - scope: user

  - type: signing
